<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Ma vie en dessins</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale = 1, height = device-height" />
  </head>

  <body onclick="click_ev()" oncontextmenu="rclick_ev()">
    <style media="screen">
      html, body {
    margin: 0;
    height: 100%;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/vara@1.4.0/lib/vara.min.js" type="text/javascript"></script>
    <div id="tlt" style="position: absolute; top:20%; width:98%; height:30%; left:1%;"></div>
    <div id="aut" style="position: absolute; top:50%; width:98%; height:25%; left:1%;"></div>
    <div id="text1" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <div id="text2" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <div id="text3" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <div id="text4" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <div id="text5" style="position: absolute; top:30%; width:80%; height:30%; left:15%;"></div>
    <div id="text6" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <div id="text7" style="position: absolute; top:30%; width:70%; height:30%; left:15%;"></div>
    <script type="text/javascript">
      var t1=0;
      var t2 =0;
      var text1 = 0;
      var text2 = 0;
      var text3 = 0;
      var text4 = 0;
      var text5 = 0;
      var text6 = 0;
      var h = 0;
      var w = 0;
      var fonts =0;
      elem = document.documentElement;
      var stage = -1;
      function click_ev(){
        hide_all();
        switch (stage) {
          case -1:
            w = window.innerWidth;
            h = window.innerHeight;
            if(w < 165*2 || h<439*2){
              fonts = 25;
            } else {
              fonts = 50;
            }
            if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) { /* Safari */
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) { /* IE11 */
    elem.msRequestFullscreen();
            }
            set();
            show_start();
          break;
        case 0:
        show_start();
          t1.draw("titlu");
          break;
        case 1:
        document.getElementById('text1').style.display = 'block';
        text1 = new Vara("#text1","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"Je suis nee a Oradea, en Roumanie, en 2010.",
          id:"t1",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          duration:5000,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
        break;
          case 2:
            document.getElementById('text2').style.display = 'block';
            text2 = new Vara("#text2","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"J'ai recontres Maria, Andrei, Maya et Iulia, l'ecole primaire.",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break;
          case 3:
            document.getElementById('text3').style.display = 'block';
            text3 = new Vara("#text3","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"J'ai lu livre scolaire pour bien et manuvais.",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break;
          case 4:
            document.getElementById('text4').style.display = 'block';
            text4 = new Vara("#text4","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"Mes parents et moi, on a visite la mer.",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break
          case 5:
            document.getElementById('text5').style.display = 'block';
            text5 = new Vara("#text5","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"Il y a, deux ans, j'ai decouvert l'informatique.La programmation c'est ma passion!",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break
          case 6:
            document.getElementById('text6').style.display = 'block';
            text6 = new Vara("#text6","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"A douze ans, j'ai fait applications et jeux.",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break
          case 7:
            document.getElementById('text7').style.display = 'block';
            text7 = new Vara("#text7","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
            text:"Merci pour votre attention!",
          id:"nog",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:true
      });
            break
          default:
            elem.requestFullscreen();
        }
        stage+=1
      }//nu uita de right click
      function rclick_ev(){
        stage -= 1;
        console.log(stage);
        click_ev();
        stage-=1
      }
      function hide_start(){
        document.getElementById('tlt').style.display = 'none';
        document.getElementById('aut').style.display='none';
      }
      function show_start(){
        document.getElementById('tlt').style.display = 'block';
        document.getElementById('aut').style.display='block';
          }
      function hide_6l(){
        document.getElementById('text1').style.display = 'none';
        document.getElementById('text2').style.display = 'none';
        document.getElementById('text3').style.display = 'none';
        document.getElementById('text4').style.display = 'none';
        document.getElementById('text5').style.display = 'none';
        document.getElementById('text6').style.display = 'none';
        document.getElementById('text7').style.display = 'none';
      }
      function hide_all(){
        hide_start();
        hide_6l();
      }
      function set(){
        t1 = new Vara("#tlt","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
          text:"Ma vie en dessins",
        strokeWidth:4,
          id:"titlu",
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:false
      });
      t2 = new Vara("#aut","https://cdn.jsdelivr.net/npm/vara@1.4.0/fonts/Shadows-Into-Light/shadows-into-light.json",[{
          text:"Milian Darius",
          id:"autor",
          strokeWidth:4, // Width / Thickness of the stroke
          textAlign:"center",
          letterSpacing:2.5,
          fontSize:fonts
      }], {
        autoAnimation:false
      });// titlu + autor
      t1.animationEnd(function(i,o){
        t2.draw('autor')
      })
      }
    </script>
  </body>
</html>
